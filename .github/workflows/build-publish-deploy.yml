name: Build & Publish & Deploy
 
on:
  push:
    branches:
      - master
 
jobs:
  build-and-publish:
    name: Build and publish Chatwoot image
    environment: production
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            ghcr.io/reconnect-stack/chatwoot:latest
            ghcr.io/reconnect-stack/chatwoot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-chatwoot:
    name: Deploy Chatwoot stack
    environment: production
    runs-on: ubuntu-latest
    needs: build-and-publish
    steps:
      - name: Notify Komodo - Chatwoot deploy
        env:
          WEBHOOK_URL: ${{ secrets.KOMODO_STACK_CHATWOOT_DEPLOY_WEBHOOK }}
          WEBHOOK_SECRET: ${{ secrets.KOMODO_STACK_CHATWOOT_DEPLOY_SECRET }}
        run: |
          PAYLOAD='{"ref":"refs/heads/main","repository":{"name":"infra","full_name":"reconnect-stack/infra"}}'
          SIG="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')"
          curl -fsSL \
            -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD"
